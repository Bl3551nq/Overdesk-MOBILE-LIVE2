name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build React Web App & Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci

      - name: Build Web Production Assets
        run: npm run build

      - name: Install Capacitor v6 Core & CLI
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6
          npm install @capacitor/android@6

      - name: Initialize Capacitor Config
        run: |
          npx cap init Overdesk com.overdesk.app --web-dir=dist

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Copy Web Assets to Android project
        run: |
          npx cap sync android

      - name: Set up Java JDK 17 (Required for Capacitor 6 Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overdesk-Mobile-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
